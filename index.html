<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>З Днем Народження, Едгаре!</title>
    
    <link rel="icon" type="image/jpeg" href="avatar.jpg" sizes="any">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><defs><pattern id=%22p%22 patternUnits=%22userSpaceOnUse%22 width=%22100%22 height=%22100%22><image href=%22avatar.jpg%22 x=%220%22 y=%220%22 width=%22100%22 height=%22100%22/></pattern></defs><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22url(%23p)%22/></svg>">

    <style>
        :root {
            --gold: #ffd700;
            --fire: #ff4500; /* Червоно-помаранчевий для іскор */
            --dark-bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            overflow-x: hidden;
            position: relative;
        }

        /* Полотно для іскор */
        #sparks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* На фоні */
            pointer-events: none; /* Щоб можна було натискати на кнопки */
        }

        /* Всі основні блоки піднімаємо над полотном іскор */
        .hero, .profile-area, .container {
            position: relative;
            z-index: 2;
        }

        /* Шапка з банером */
        .hero {
            width: 100%;
            height: 0;
            padding-bottom: 25%; /* Співвідношення сторін банера YouTube */
            background: url('banner.jpg') center top/contain no-repeat;
            background-color: var(--dark-bg);
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%; /* Трохи вищий градієнт для м'якшого переходу */
            background: linear-gradient(transparent, var(--dark-bg));
        }

        /* Профіль */
        .profile-area {
            text-align: center;
            margin-top: -10%; /* Відносний відступ залежно від ширини екрана */
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .profile-area { margin-top: -15%; } /* На мобільних сильніше наповзання */
        }

        .main-avatar {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid var(--gold);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
            object-fit: cover;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
            50% { box-shadow: 0 0 35px rgba(255, 215, 0, 0.7); }
            100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
        }

        header h1 {
            font-size: 2.5rem;
            margin: 15px 0 5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
            letter-spacing: 1px;
            font-weight: 800;
        }

        .date-badge {
            background: var(--gold);
            color: #000;
            padding: 5px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.95rem;
            display: inline-block;
            box-shadow: 0 2px 10px rgba(255,215,0,0.3);
        }

        /* Контент */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        .video-box {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 15px;
            margin-bottom: 60px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 15px;
        }

        .video-container iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }

        /* Кнопки соцмереж */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        .link-item {
            background: var(--glass);
            backdrop-filter: blur(5px);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 16px;
            text-decoration: none;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .link-item:hover {
            background: rgba(255, 215, 0, 0.08);
            border-color: var(--gold);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 5px 20px rgba(255,215,0,0.15);
        }

        footer {
            text-align: center;
            padding: 60px 40px 20px;
            opacity: 0.3;
            font-size: 0.8rem;
        }

        h2 { color: var(--gold); text-align: center; margin-bottom: 35px; font-weight: 300; letter-spacing: 3px; font-size: 1.2rem; text-transform: uppercase;}

    </style>
</head>
<body>

    <canvas id="sparks-canvas"></canvas>

    <section class="hero"></section>

    <div class="profile-area">
        <img src="avatar.jpg" alt="Edgar" class="main-avatar">
        <header>
            <h1>ЕДГАР МИРОТВОРЕЦЬ</h1>
            <div class="date-badge">25 ТРАВНЯ</div>
        </header>
    </div>

    <div class="container">
        
        <div class="video-box">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=0&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </div>

        <h2>ОФІЦІЙНІ РЕСУРСИ</h2>
        
        <div class="links-grid">
            <a href="https://www.youtube.com/@EdgarLive2026" class="link-item" target="_blank">Edgar Live 2026</a>
            <a href="https://youtube.com/@MIROTVORETS_NA_SVYAZI" class="link-item" target="_blank">Миротворець на зв'язку</a>
            <a href="https://t.me/edgarU" class="link-item" target="_blank">Telegram Канал</a>
            <a href="https://patreon.com/Edgarastream" class="link-item" target="_blank">Patreon Support</a>
            <a href="https://instagram.com/edgar_mirotvorets" class="link-item" target="_blank">Instagram</a>
            <a href="https://tiktok.com/@edgaruakeeper" class="link-item" target="_blank">TikTok Official</a>
            <a href="https://t.me/edgarasUA" class="link-item" target="_blank">Чат "В гостях у Эдгара"</a>
        </div>

        <footer>
            <p>Created by YaMiller for Edgar Mirotvorets Community © 2026</p>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('sparks-canvas');
        const ctx = canvas.getContext('2d');

        let width, height, sparks = [];

        // Налаштування
        const SPARKS_COUNT = 50; // Кількість іскор
        const COLORS = ['#ffd700', '#ff4500', '#ff8c00']; // Золотий, Вогняний, Помаранчевий

        function init() {
            resize();
            for (let i = 0; i < SPARKS_COUNT; i++) {
                sparks.push(createSpark());
            }
            animate();
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function createSpark() {
            return {
                x: Math.random() * width,
                y: Math.random() * height + height, // Починають знизу
                size: Math.random() * 2 + 0.5,
                color: COLORS[Math.floor(Math.random() * COLORS.length)],
                speedY: Math.random() * -1 - 0.5, // Летять вгору
                speedX: Math.random() * 1 - 0.5, // Трохи хитаються
                opacity: Math.random() * 0.5 + 0.2,
                wobble: Math.random() * Math.PI * 2 // Для хвилеподібного руху
            };
        }

        function updateSpark(s) {
            s.y += s.speedY;
            s.x += s.speedX + Math.sin(s.wobble) * 0.2; // Додаємо хитання
            s.wobble += 0.02;

            // Якщо вилетіла за екран вгору, повертаємо вниз
            if (s.y < -10) {
                s.y = height + 10;
                s.x = Math.random() * width;
            }
        }

        function drawSpark(s) {
            ctx.globalAlpha = s.opacity;
            ctx.fillStyle = s.color;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            ctx.fill();
        }

        function animate() {
            ctx.clearRect(0, 0, width, height); // Очищаємо полотно
            sparks.forEach(s => {
                updateSpark(s);
                drawSpark(s);
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        init();
    </script>

</body>
</html>
