<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>З Днем Народження, Едгаре!</title>
    
    <link rel="icon" type="image/jpeg" href="avatar.jpg">

    <style>
        :root {
            --gold: #ffd700;
            --fire: #ff4500;
            --dark-bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            overflow-x: hidden;
            position: relative;
        }

        #sparks-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .hero, .profile-area, .container {
            position: relative;
            z-index: 2;
        }

        .hero {
            width: 100%;
            height: 0;
            padding-bottom: 25%;
            background: url('banner.jpg') center top/contain no-repeat;
            background-color: var(--dark-bg);
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 60%;
            background: linear-gradient(transparent, var(--dark-bg));
        }

        .profile-area {
            text-align: center;
            margin-top: -10%;
            margin-bottom: 20px;
        }

        .main-avatar {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid var(--gold);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
            object-fit: cover;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
            50% { box-shadow: 0 0 35px rgba(255, 215, 0, 0.7); }
        }

        header h1 {
            font-size: 2.5rem;
            margin: 15px 0 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
            letter-spacing: 1px;
            font-weight: 800;
        }

        /* Стиль таймера */
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .timer-unit {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
            padding: 10px;
            border-radius: 12px;
            min-width: 60px;
        }

        .timer-num {
            display: block;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--gold);
        }

        .timer-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            color: #888;
        }

        .bday-wish {
            font-size: 1.5rem;
            color: var(--gold);
            font-weight: bold;
            display: none; /* Показується тільки 25-го */
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        .video-box {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 15px;
            margin-bottom: 60px;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 15px;
        }

        .video-container iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        .link-item {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 16px;
            text-decoration: none;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            transition: 0.3s;
        }

        .link-item:hover {
            background: rgba(255, 215, 0, 0.08);
            border-color: var(--gold);
            transform: translateY(-3px);
        }

        footer {
            text-align: center;
            padding: 60px 40px 20px;
            opacity: 0.3;
            font-size: 0.8rem;
        }

        h2 { color: var(--gold); text-align: center; margin-bottom: 35px; font-weight: 300; letter-spacing: 3px; font-size: 1.2rem;}
    </style>
</head>
<body>

    <canvas id="sparks-canvas"></canvas>

    <section class="hero"></section>

    <div class="profile-area">
        <img src="avatar.jpg" alt="Edgar" class="main-avatar">
        <header>
            <h1>ЕДГАР МИРОТВОРЕЦЬ</h1>
            
            <div id="timer" class="countdown-container">
                <div class="timer-unit"><span id="days" class="timer-num">00</span><span class="timer-label">днів</span></div>
                <div class="timer-unit"><span id="hours" class="timer-num">00</span><span class="timer-label">год</span></div>
                <div class="timer-unit"><span id="minutes" class="timer-num">00</span><span class="timer-label">хв</span></div>
                <div class="timer-unit"><span id="seconds" class="timer-num">00</span><span class="timer-label">сек</span></div>
            </div>
            <div id="wish" class="bday-wish">З ДНЕМ НАРОДЖЕННЯ! 🎉</div>
        </header>
    </div>

    <div class="container">
        <div class="video-box">
            <div class="video-container">
                <iframe src="https://www.youtube.com/watch?v=mD_MwJNajF0" allowfullscreen></iframe>
            </div>
        </div>

        <h2>ОФІЦІЙНІ РЕСУРСИ</h2>
        <div class="links-grid">
            <a href="https://www.youtube.com/@EdgarLive2026" class="link-item" target="_blank">Edgar Live 2026</a>
            <a href="https://youtube.com/@MIROTVORETS_NA_SVYAZI" class="link-item" target="_blank">Миротворець на зв'язку</a>
            <a href="https://t.me/edgarU" class="link-item" target="_blank">Telegram Канал</a>
            <a href="https://patreon.com/Edgarastream" class="link-item" target="_blank">Patreon Support</a>
            <a href="https://instagram.com/edgar_mirotvorets" class="link-item" target="_blank">Instagram</a>
            <a href="https://tiktok.com/@edgaruakeeper" class="link-item" target="_blank">TikTok Official</a>
            <a href="https://t.me/edgarasUA" class="link-item" target="_blank">Чат Спільноти</a>
        </div>

        <footer>
            <p>Created by YaMiller for Edgar Mirotvorets Community © 2026</p>
        </footer>
    </div>

    <script>
        // --- СКРИПТ ТАЙМЕРА ---
        function updateTimer() {
            const targetDate = new Date("May 25, 2026 00:00:00").getTime();
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.getElementById('timer').style.display = 'none';
                document.getElementById('wish').style.display = 'block';
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = d.toString().padStart(2, '0');
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = s.toString().padStart(2, '0');
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // --- СКРИПТ ІСКОР ---
        const canvas = document.getElementById('sparks-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, sparks = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function createSpark() {
            return {
                x: Math.random() * width,
                y: Math.random() * height + height,
                size: Math.random() * 2 + 0.5,
                color: ['#ffd700', '#ff4500', '#ff8c00'][Math.floor(Math.random()*3)],
                speedY: Math.random() * -1 - 0.5,
                speedX: Math.random() * 1 - 0.5,
                opacity: Math.random() * 0.5 + 0.2,
                wobble: Math.random() * Math.PI * 2
            };
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            sparks.forEach(s => {
                s.y += s.speedY;
                s.x += s.speedX + Math.sin(s.wobble) * 0.2;
                s.wobble += 0.02;
                if (s.y < -10) { s.y = height + 10; s.x = Math.random() * width; }
                ctx.globalAlpha = s.opacity;
                ctx.fillStyle = s.color;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        for(let i=0; i<50; i++) sparks.push(createSpark());
        animate();
    </script>

</body>
</html>
