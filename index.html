<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>З Днем Народження, Едгаре!</title>
    
    <link rel="icon" type="image/jpeg" href="avatar.jpg">

    <style>
        :root {
            --gold: #ffd700;
            --dark-bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Шапка з банером */
        .hero {
            position: relative;
            height: 400px;
            background: url('banner.jpg') center/cover no-repeat;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            background: linear-gradient(transparent, var(--dark-bg));
        }

        /* Профіль */
        .profile-area {
            position: relative;
            z-index: 10;
            text-align: center;
            margin-top: -80px;
        }

        .main-avatar {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid var(--gold);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
            object-fit: cover;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
            50% { box-shadow: 0 0 35px rgba(255, 215, 0, 0.7); }
            100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
        }

        header h1 {
            font-size: 2.5rem;
            margin: 15px 0 5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            letter-spacing: 1px;
        }

        .date-badge {
            background: var(--gold);
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 30px;
        }

        /* Контент */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        .video-box {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 50px;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 15px;
        }

        .video-container iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }

        /* Кнопки соцмереж */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .link-item {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 16px;
            text-decoration: none;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--gold);
            transform: translateY(-3px);
        }

        .link-item img {
            width: 30px;
            height: 30px;
            filter: grayscale(1) brightness(2);
        }

        footer {
            text-align: center;
            padding: 40px;
            opacity: 0.4;
            font-size: 0.8rem;
        }

        h2 { color: var(--gold); text-align: center; margin-bottom: 30px; font-weight: 300; letter-spacing: 2px; }

    </style>
</head>
<body>

    <section class="hero"></section>

    <div class="profile-area">
        <img src="avatar.jpg" alt="Edgar" class="main-avatar">
        <header>
            <h1>ЕДГАР МИРОТВОРЕЦЬ</h1>
            <div class="date-badge">25 ТРАВНЯ</div>
        </header>
    </div>

    <div class="container">
        
        <div class="video-box">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
            </div>
        </div>

        <h2>ОФІЦІЙНІ РЕСУРСИ</h2>
        
        <div class="links-grid">
            <a href="https://www.youtube.com/@EdgarLive2026" class="link-item" target="_blank">
                <span>Edgar Live 2026</span>
            </a>
            <a href="https://youtube.com/@MIROTVORETS_NA_SVYAZI" class="link-item" target="_blank">
                <span>Миротворець на зв'язку</span>
            </a>
            <a href="https://t.me/edgarU" class="link-item" target="_blank">
                <span>Telegram Канал</span>
            </a>
            <a href="https://patreon.com/Edgarastream" class="link-item" target="_blank">
                <span>Patreon Support</span>
            </a>
            <a href="https://instagram.com/edgar_mirotvorets" class="link-item" target="_blank">
                <span>Instagram</span>
            </a>
            <a href="https://tiktok.com/@edgaruakeeper" class="link-item" target="_blank">
                <span>TikTok Official</span>
            </a>
            <a href="https://t.me/edgarasUA" class="link-item" target="_blank">
                <span>Чат "В гостях у Эдгара"</span>
            </a>
        </div>

        <footer>
            <p>Created by YaMiller for Edgar Mirotvorets Community © 2026</p>
        </footer>
    </div>

</body>
</html>
