<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>З Днем Народження, Едгаре!</title>
    
    <link rel="icon" type="image/jpeg" href="avatar.jpg">
    <link rel="apple-touch-icon" href="avatar.jpg">

    <style>
        :root {
            --gold: #ffd700;
            --fire: #ff4500;
            --dark-bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            overflow-x: hidden;
            position: relative;
        }

        /* Полотно для іскор */
        #sparks-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .hero, .profile-area, .container {
            position: relative;
            z-index: 2;
        }

        /* Шапка з банером */
        .hero {
            width: 100%;
            height: 0;
            padding-bottom: 25%; 
            background: url('banner.jpg') center top/contain no-repeat;
            background-color: var(--dark-bg);
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 60%;
            background: linear-gradient(transparent, var(--dark-bg));
        }

        /* Профіль */
        .profile-area {
            text-align: center;
            margin-top: -10%;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .profile-area { margin-top: -15%; }
        }

        .main-avatar {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid var(--gold);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
            object-fit: cover;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
            50% { box-shadow: 0 0 35px rgba(255, 215, 0, 0.7); }
        }

        header h1 {
            font-size: 2.5rem;
            margin: 15px 0 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
            letter-spacing: 1px;
            font-weight: 800;
        }

        /* Стиль таймера */
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .timer-unit {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
            padding: 10px;
            border-radius: 12px;
            min-width: 65px;
        }

        .timer-num {
            display: block;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--gold);
        }

        .timer-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #aaa;
        }

        .bday-wish {
            font-size: 1.8rem;
            color: var(--gold);
            font-weight: bold;
            display: none;
            text-shadow: 0 0 15px rgba(255,215,0,0.6);
            margin: 20px 0;
        }

        /* Контент */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        .video-box {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 15px;
            margin-bottom: 60px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 15px;
        }

        .video-container iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }

        /* Кнопки */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        .link-item {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 16px;
            text-decoration: none;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .link-item:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: var(--gold);
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(255,215,0,0.1);
        }

        footer {
            text-align: center;
            padding: 60px 40px 20px;
            opacity: 0.3;
            font-size: 0.8rem;
        }

        h2 { color: var(--gold); text-align: center; margin-bottom: 35px; font-weight: 300; letter-spacing: 3px; font-size: 1.3rem; text-transform: uppercase;}

    </style>
</head>
<body>

    <canvas id="sparks-canvas"></canvas>

    <section class="hero"></section>

    <div class="profile-area">
        <img src="avatar.jpg" alt="Edgar" class="main-avatar">
        <header>
            <h1>ЕДГАР МИРОТВОРЕЦЬ</h1>
            
            <div id="timer" class="countdown-container">
                <div class="timer-unit"><span id="days" class="timer-num">00</span><span class="timer-label">днів</span></div>
                <div class="timer-unit"><span id="hours" class="timer-num">00</span><span class="timer-label">год</span></div>
                <div class="timer-unit"><span id="minutes" class="timer-num">00</span><span class="timer-label">хв</span></div>
                <div class="timer-unit"><span id="seconds" class="timer-num">00</span><span class="timer-label">сек</span></div>
            </div>
            <div id="wish" class="bday-wish">З ДНЕМ НАРОДЖЕН
